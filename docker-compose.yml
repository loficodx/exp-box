services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: exp-box-backend
    environment:
      DATABASE_URL: sqlite://data/exp-box.db
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    networks: [app_net, targets_net]

  frontend:
    build:
      context: ./frontend
    container_name: exp-box-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks: [app_net]

  auth-service:
    build: ./services/auth
    container_name: exp-box-auth-service
    environment:
      AUTH_DATABASE_URL: sqlite://data/auth.db
    expose:
      - "9001"
    volumes:
      - auth_data:/app/data
    networks:
      - app_net

  room-rce:
    build: ./rooms/rce
    container_name: exp-box-room-rce
    networks: [ targets_net ]
    read_only: true
    tmpfs: [ "/tmp" ]
    cap_drop: [ "ALL" ]
    security_opt: [ "no-new-privileges:true" ]
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    init: true
    restart: unless-stopped

volumes:
  sqlite_data:
  auth_data:

networks:
  app_net:
  targets_net:
    internal: true
