services:
  postgres:
    image: postgres:16-alpine
    container_name: exp-box-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exp_box}
      POSTGRES_USER: ${POSTGRES_USER:-exp_box}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exp_box_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app_net]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: exp-box-backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-exp_box}:${POSTGRES_PASSWORD:-exp_box_password}@postgres:5432/${POSTGRES_DB:-exp_box}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "8000:8000"
    networks: [app_net, targets_net]

  frontend:
    build:
      context: ./frontend
    container_name: exp-box-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks: [app_net]

  room-rce:
    build: ./rooms/rce
    container_name: exp-box-room-rce
    networks: [targets_net]
    read_only: true
    tmpfs: ["/tmp"]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    restart: always

volumes:
  postgres_data:

networks:
  app_net:
  targets_net:
    internal: true
